- id: CE-ACC-001
  engine: Character Engine
  status: Active
  priority: Mandatory
  source: BCube_Prompt_Engine_v3_Complete_Production_Standard_Master_Part_10.docx
  requirement: Character behaviour MUST model safe, respectful and age-appropriate
    conduct.
  rationale: Maintain recognisable, trustworthy and educationally effective characters.
  inputs: Illustration metadata, curriculum context, page objective and continuity
    profile.
  outputs: Character specification, pose, expression and interaction metadata.
  validation: Verify identity, continuity, accessibility and educational appropriateness.
  compiler_impact: Produces the Character Engine™ block for the BCube Gold Production
    Prompt™.
