name: Validate Problem Solvers Commit B

on:
  push:
    branches:
      - book6/problem-solvers-phase1-3
    paths:
      - 'BCube_Gold_Production_v4/scripts/validate_problem_solvers_commit_b.py'
      - 'BCube_Gold_Production_v4/books/nursery/problem-solvers/production-prompts/**'
      - '.github/workflows/validate-problem-solvers-commit-b.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: book6/problem-solvers-phase1-3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate and validate Commit B package
        run: python BCube_Gold_Production_v4/scripts/validate_problem_solvers_commit_b.py

      - name: Commit generated validation outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BCube_Gold_Production_v4/books/nursery/problem-solvers/validation \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/qa \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/illustration \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/production \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/publishing
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
          else
            git commit -m 'feat(book6): add Problem Solvers Gold validation framework'
            git push origin HEAD:book6/problem-solvers-phase1-3
          fi
