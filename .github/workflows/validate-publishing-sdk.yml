name: Validate Publishing SDK

on:
  pull_request:
    paths:
      - 'bcube-publishing-sdk/**'
      - 'scripts/bcube_publish.py'
      - 'scripts/run_bcube_cover_pipeline.py'
      - 'scripts/run_bcube_front_matter_pipeline.py'
      - 'requirements.txt'
      - '.github/workflows/validate-publishing-sdk.yml'
  push:
    branches: [main]
    paths:
      - 'bcube-publishing-sdk/**'
      - 'scripts/bcube_publish.py'
      - 'scripts/run_bcube_cover_pipeline.py'
      - 'scripts/run_bcube_front_matter_pipeline.py'
      - 'requirements.txt'
      - '.github/workflows/validate-publishing-sdk.yml'

jobs:
  validate-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile SDK and pipelines
        run: python -m py_compile bcube-publishing-sdk/composer/*.py bcube-publishing-sdk/validators/*.py scripts/bcube_publish.py scripts/run_bcube_cover_pipeline.py scripts/run_bcube_front_matter_pipeline.py
      - name: Validate SDK contracts
        run: python bcube-publishing-sdk/validators/validate_sdk.py
      - name: Validate Nursery LKG UKG cover registry
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          registry = json.loads(Path('bcube-publishing-sdk/books/cover-books.json').read_text(encoding='utf-8'))
          shared = registry['shared']
          assert len(shared['pillars']) == 5
          expected = {'nursery': ('Nursery','3+','NURSERY'), 'lkg': ('LKG','4+','LKG'), 'ukg': ('UKG','5+','UKG')}
          total = 0
          for level, contract in expected.items():
              data = registry['levels'][level]
              assert (data['display_level'],data['age'],data['id_level']) == contract
              assert len(data['books']) == 10
              total += len(data['books'])
          assert total == 30
          PY
      - name: Test registry-driven prompt discovery
        run: |
          python scripts/bcube_publish.py --level nursery --book curiosity-explorers --page cover --prompt-only
          python scripts/bcube_publish.py --level lkg --book early-maths-adventures --page cover --prompt-only
          python scripts/bcube_publish.py --level ukg --book young-scientists --page cover --prompt-only
      - name: Test deterministic cover compositor
        run: python bcube-publishing-sdk/composer/compose_nursery_cover_strict.py --self-test
      - name: Test V5.1 adaptive occupancy scaling
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path
          p=Path('bcube-publishing-sdk/composer/compose_nursery_cover_strict.py')
          spec=importlib.util.spec_from_file_location('strict_cover',p)
          module=importlib.util.module_from_spec(spec); spec.loader.exec_module(module)
          for case in [(1448,1086,1630,1690,.70),(1280,960,1630,1690,.70),(1024,1024,1630,1690,.70)]:
              w,h,scale,occupancy=module._adaptive_dimensions(*case)
              assert occupancy + module.OCCUPANCY_EPSILON >= case[-1]
              assert scale > 0
          PY
      - name: Test V6 About and Publisher pages
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw
          path = Path('/tmp/bcube-about-illustration.png')
          image = Image.new('RGB', (1200, 1000), 'white')
          draw = ImageDraw.Draw(image)
          draw.rounded_rectangle((100,100,1100,900), radius=80, fill='#F4D9EC')
          image.save(path, 'PNG', dpi=(300,300))
          PY
          python scripts/run_bcube_front_matter_pipeline.py --level nursery --book confidence-builders --page about --illustration /tmp/bcube-about-illustration.png
          python scripts/run_bcube_front_matter_pipeline.py --level lkg --book early-maths-adventures --page publisher
          python - <<'PY'
          import json
          from pathlib import Path
          from PIL import Image
          for path in [Path('production-renders/pages/CB-NURSERY-V4-P002.png'), Path('production-renders/pages/EM-LKG-V4-P003.png')]:
              assert path.is_file(), path
              with Image.open(path) as image:
                  assert image.size == (2480,3508), (path,image.size)
                  assert image.info.get('dpi',[0])[0] >= 299
          evidence=json.loads(Path('production-renders/qa-manifests/CB-NURSERY-V4-P002.json').read_text())
          assert evidence['header_type'] == 'BOOK_HEADER'
          assert 'teacher_panel' not in evidence['components']
          assert 'parent_panel' not in evidence['components']
          assert evidence['prohibited_component_counts']['visible_page_number'] == 0
          publisher=json.loads(Path('production-renders/qa-manifests/EM-LKG-V4-P003.json').read_text())
          assert publisher['header_type'] == 'MINIMAL_HEADER'
          assert publisher['qa']['illustration_free'] is True
          for component in ('illustration_layer','official_star','learning_goal','activity_banner',
                            'teacher_panel','parent_panel','isbn'):
              assert publisher['prohibited_component_counts'][component] == 0
          page_data=json.loads(Path('production-renders/page-data/EM-LKG-V4-P003.json').read_text())
          assert page_data['publication_code'] == 'BCUBE-LKG-EM-003'
          assert page_data['publisher']['phone'] == '+91 79750 59945'
          assert 'isbn' not in page_data
          PY
      - name: Test V6 Contents page
        run: |
          python scripts/run_bcube_front_matter_pipeline.py --level nursery --book communication-champions --page contents
          test -f production-renders/pages/CC-NURSERY-V4-P004.png
      - name: Check pipeline help
        run: |
          python scripts/run_bcube_cover_pipeline.py --help
          python scripts/run_bcube_front_matter_pipeline.py --help
