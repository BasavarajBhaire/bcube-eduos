name: Temporary Communication Pages Export

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  export-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Package exact approved page binaries
        run: |
          mkdir -p export
          cp -R BCube_Gold_Production_v4/approved-assets/nursery/communication-champions/pages export/
          cp BCube_Gold_Production_v4/manifests/nursery/communication-champions.release-v4.json export/
          find export/pages -maxdepth 1 -type f -printf '%f\t%s bytes\n' | sort > export/source-files.txt
      - name: Upload exact source files
        uses: actions/upload-artifact@v4
        with:
          name: communication-pages-source-export
          path: export
          if-no-files-found: error
          retention-days: 1
