name: Restore Communication Champions pages

on:
  push:
    branches:
      - restore/communication-champions-pixel-header-fixes
    paths:
      - scripts/inventory_communication_champions_pages.py
      - scripts/restore_communication_champions_pages.py
      - .github/workflows/inventory-communication-champions-pages.yml
      - BCube_Gold_Production_v4/approved-assets/nursery/communication-champions/pages/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: restore-communication-champions-pages
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out safety branch
        uses: actions/checkout@v4
        with:
          ref: restore/communication-champions-pixel-header-fixes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependencies
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Inventory approved PNG files
        run: python scripts/inventory_communication_champions_pages.py

      - name: Restore selected pages non-destructively
        run: python scripts/restore_communication_champions_pages.py

      - name: Validate originals remain untouched
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = Path('BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/validation/restoration-report.json')
          rows = json.loads(report.read_text(encoding='utf-8'))
          bad = [r for r in rows if r.get('valid_source') and not r.get('source_unchanged')]
          if bad:
              raise SystemExit(f'Approved source mutation detected: {bad}')
          restored = [r for r in rows if r.get('status') == 'restored']
          invalid_size = [r for r in restored if r.get('output_dimensions') != [2480, 3508]]
          if invalid_size:
              raise SystemExit(f'Unexpected output dimensions: {invalid_size}')
          print(f'Validated {len(restored)} restored pages; approved sources unchanged.')
          PY

      - name: Commit restoration outputs and validation reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/restoration-work/nursery/communication-champions
          if git diff --cached --quiet; then
            echo "Restoration outputs are unchanged."
          else
            git commit -m "Restore Communication Champions page headers and print pixels"
            git push origin HEAD:restore/communication-champions-pixel-header-fixes
          fi
