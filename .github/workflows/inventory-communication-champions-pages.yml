name: Communication Champions recovery review

on:
  workflow_dispatch:
  push:
    branches:
      - restore/communication-champions-pixel-header-fixes
    paths:
      - scripts/restore_communication_champions_pages.py
      - .github/workflows/inventory-communication-champions-pages.yml

permissions:
  contents: write

concurrency:
  group: communication-champions-recovery-review
  cancel-in-progress: true

jobs:
  recovery-review:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out safety branch
        uses: actions/checkout@v4
        with:
          ref: restore/communication-champions-pixel-header-fixes
          fetch-depth: 0

      - name: Remove rejected generated outputs
        run: |
          rm -rf BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/restored-pages
          mkdir -p BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/rejected
          cat > BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/rejected/README.md <<'EOF'
          # Rejected restoration outputs

          The previous generated candidates were rejected after visual review.

          Reasons include duplicate logos, damaged header composition, inconsistent title scale,
          incorrect instruction-banner alignment, and mechanical validation that did not detect
          visible layout defects.

          These pages are not approved and must not be merged or published.
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependency
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Generate review-only diagnostics
        run: python scripts/restore_communication_champions_pages.py

      - name: Upload review diagnostics only
        uses: actions/upload-artifact@v4
        with:
          name: communication-champions-recovery-review
          path: |
            BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/review
            BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/validation
          if-no-files-found: error
          retention-days: 7

      - name: Commit rejection record and remove broken candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A BCube_Gold_Production_v4/restoration-work/nursery/communication-champions
          if git diff --cached --quiet; then
            echo "No repository cleanup changes."
          else
            git commit -m "Reject broken Communication Champions restoration candidates"
            git pull --rebase origin restore/communication-champions-pixel-header-fixes
            git push origin HEAD:restore/communication-champions-pixel-header-fixes
          fi

      - name: Block merge until manual approval
        run: |
          echo "Visual approval is mandatory. No generated PNG is publishable from this workflow."
          exit 1
