name: Inventory Communication Champions pages

on:
  push:
    branches:
      - restore/communication-champions-pixel-header-fixes
    paths:
      - scripts/inventory_communication_champions_pages.py
      - .github/workflows/inventory-communication-champions-pages.yml
      - BCube_Gold_Production_v4/approved-assets/nursery/communication-champions/pages/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: restore/communication-champions-pixel-header-fixes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check Pillow

      - name: Inventory approved PNG files
        run: python scripts/inventory_communication_champions_pages.py

      - name: Commit inventory results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/restoration-work/nursery/communication-champions/inventory
          if git diff --cached --quiet; then
            echo "Inventory is unchanged."
          else
            git commit -m "Inventory approved Communication Champions page assets"
            git push origin HEAD:restore/communication-champions-pixel-header-fixes
          fi
