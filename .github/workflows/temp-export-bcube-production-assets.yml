name: Temporary BCube Production Assets Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect locked assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          cp production-prompts/confidence-builders/nursery/v4/pages/CB-NURSERY-V4-P001-confidence-builders.json export/
          find . -type f | grep -Ei '(star[^/]*\.(png|jpg|jpeg)$|meet-star[^/]*\.png$|logo[^/]*\.(png|jpg|jpeg)$)' > export/asset-paths.txt || true
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            cp --parents "$file" export/
          done < export/asset-paths.txt
          test -s export/asset-paths.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bcube-production-assets
          path: export/
          retention-days: 1
