name: Bootstrap LKG Early Literacy V4

on:
  push:
    branches:
      - agent/lkg-early-literacy-v4
    paths:
      - '.github/workflows/bootstrap-lkg-early-literacy-v4.yml'
      - 'BCube_Gold_Production_v4/scripts/.lkg-patches/patch-early-literacy-v4.py'

permissions:
  contents: write

concurrency:
  group: bootstrap-lkg-early-literacy-v4
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[skip lkg bootstrap]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/lkg-early-literacy-v4
          fetch-depth: 0

      - name: Patch and syntax-check the reusable compiler
        shell: bash
        run: |
          python BCube_Gold_Production_v4/scripts/.lkg-patches/patch-early-literacy-v4.py
          python -m py_compile BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py

      - name: Generate and validate Early Literacy Adventures
        shell: bash
        run: |
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py early-literacy-adventures
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py early-literacy-adventures --validate-only

      - name: Verify cumulative portfolio and single back-cover architecture
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          qa = json.loads(Path('BCube_Gold_Production_v4/qa/lkg-v4-prompts-validation.json').read_text())
          assert qa['completed_books'] == ['communication-champions', 'early-literacy-adventures'], qa
          assert qa['books_validated'] == 2
          assert qa['page_prompts'] == 88
          assert qa['markdown_files'] == 88
          assert qa['json_files'] == 88
          assert qa['source_backed_pages'] == 80
          assert qa['checks'] == 1144
          assert qa['critical_defects'] == 0
          assert qa['status'] == 'PASS'
          assert qa['next_book'] == 'early-maths-adventures'

          manifest = json.loads(Path('production-prompts/early-literacy-adventures/lkg/v4/release-manifest.json').read_text())
          pages = {page['physical']: page for page in manifest['pages']}
          assert pages[43]['title'] == 'My Literacy Celebration', pages[43]
          assert pages[43]['printed'] == 42
          assert pages[43]['source_prompt'] == 'EL-LKG-V3-P041'
          assert pages[44]['title'] == 'Early Literacy Adventures — Back Cover'
          assert pages[44]['printed'] is None
          assert pages[44]['source_prompt'] is None
          assert sum(1 for page in manifest['pages'] if page['title'].endswith('Back Cover')) == 1
          PY

      - name: Remove bootstrap files and commit generated book
        shell: bash
        run: |
          rm -rf BCube_Gold_Production_v4/scripts/.lkg-patches
          rm -f .github/workflows/bootstrap-lkg-early-literacy-v4.yml
          git config user.name 'BCube Production Bot'
          git config user.email 'info@bcubefutureacademy.in'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Finalize LKG Early Literacy Adventures V4 prompts [skip lkg bootstrap]'
          git push origin HEAD:agent/lkg-early-literacy-v4
