name: Stage 3 Visual QA

on:
  workflow_dispatch:
    inputs:
      expected_pages:
        description: Expected page count
        required: false
        default: '440'
  push:
    branches:
      - normalization/nursery-gold-v5
    paths:
      - 'BCube_Gold_Production_v4/pipeline/stage3-visual-qa/**'
      - '.github/workflows/stage3-visual-qa.yml'

permissions:
  contents: read

env:
  STAGE2_MANIFEST: BCube_Gold_Production_v4/pipeline/stage2-illustration-generation/output/stage2-manifest.json
  STAGE3_OUTPUT: BCube_Gold_Production_v4/pipeline/stage3-visual-qa/output

jobs:
  validate-stage2-entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Stage 3 Visual QA
        run: |
          python BCube_Gold_Production_v4/pipeline/stage3-visual-qa/stage3_visual_qa.py \
            --stage2-manifest "$STAGE2_MANIFEST" \
            --expected-pages "${{ github.event.inputs.expected_pages || '440' }}"

      - name: Upload Stage 3 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-visual-qa-reports
          path: ${{ env.STAGE3_OUTPUT }}
          if-no-files-found: warn

      - name: Publish summary
        if: always()
        run: |
          if [ -f "$STAGE3_OUTPUT/stage3-summary.md" ]; then
            cat "$STAGE3_OUTPUT/stage3-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Stage 3 did not start because the Stage 2 manifest is unavailable.' >> "$GITHUB_STEP_SUMMARY"
          fi
