name: Bootstrap LKG Logical Thinking V4

on:
  push:
    branches:
      - agent/lkg-logical-thinking-v4
    paths:
      - '.github/workflows/bootstrap-lkg-logical-thinking-v4.yml'

permissions:
  contents: write

concurrency:
  group: bootstrap-lkg-logical-thinking-v4
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[skip lkg bootstrap]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/lkg-logical-thinking-v4
          fetch-depth: 0

      - name: Verify branch starts from latest merged main
        shell: bash
        run: |
          test "$(git merge-base HEAD origin/main)" = "ba464cfef88fa41f1a095a85559df1582f562c7b"

      - name: Generate and validate Logical Thinking Adventures
        shell: bash
        run: |
          python -m py_compile BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py logical-thinking-adventures
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py logical-thinking-adventures --validate-only
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('production-prompts/logical-thinking-adventures/lkg/v4')
          manifest = json.loads((root / 'release-manifest.json').read_text(encoding='utf-8'))
          assert len(manifest['pages']) == 44
          assert [p['physical'] for p in manifest['pages']] == list(range(1, 45))
          assert len(list((root / 'pages').glob('*.md'))) == 44
          assert len(list((root / 'pages').glob('*.json'))) == 44
          qa = json.loads(Path('BCube_Gold_Production_v4/qa/lkg-v4-prompts-validation.json').read_text(encoding='utf-8'))
          assert qa['books_validated'] == 4
          assert qa['completed_books'] == [
              'communication-champions',
              'early-literacy-adventures',
              'early-maths-adventures',
              'logical-thinking-adventures',
          ]
          assert qa['page_prompts'] == 176
          assert qa['markdown_files'] == 176
          assert qa['json_files'] == 176
          assert qa['checks'] == 2288
          assert qa['critical_defects'] == 0
          assert qa['status'] == 'PASS'
          assert qa['next_book'] == 'stem-explorers'
          PY

      - name: Remove bootstrap workflow
        shell: bash
        run: rm -f .github/workflows/bootstrap-lkg-logical-thinking-v4.yml

      - name: Commit generated book
        shell: bash
        run: |
          git config user.name 'BCube Production Bot'
          git config user.email 'info@bcubefutureacademy.in'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Finalize LKG Logical Thinking Adventures V4 prompts [skip lkg bootstrap]'
          git push origin HEAD:agent/lkg-logical-thinking-v4
