name: Build UKG V4 Book

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: ukg-v4-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'agent/ukg-') && endsWith(github.head_ref, '-v4') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Resolve UKG build trigger
        id: book
        shell: bash
        run: |
          slug="${GITHUB_HEAD_REF#agent/ukg-}"
          slug="${slug%-v4}"
          trigger="BCube_Gold_Production_v4/queue/ukg/${slug}.trigger"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "trigger=${trigger}" >> "$GITHUB_OUTPUT"
          if test -f "$trigger" && test -d "production-prompts/${slug}/ukg/v3/pages"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare, compile and validate UKG book
        if: ${{ steps.book.outputs.build == 'true' }}
        shell: bash
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
        run: |
          python BCube_Gold_Production_v4/scripts/prepare-ukg-v4-book.py
          python -m py_compile BCube_Gold_Production_v4/scripts/prepare-ukg-v4-book.py
          python -m py_compile BCube_Gold_Production_v4/scripts/build-ukg-v4-prompts.py
          python BCube_Gold_Production_v4/scripts/build-ukg-v4-prompts.py "$BOOK_SLUG"
          python BCube_Gold_Production_v4/scripts/build-ukg-v4-prompts.py "$BOOK_SLUG" --validate-only
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          slug = os.environ['BOOK_SLUG']
          root = Path('production-prompts') / slug / 'ukg' / 'v4'
          manifest = json.loads((root / 'release-manifest.json').read_text(encoding='utf-8'))
          qa = json.loads(Path('BCube_Gold_Production_v4/qa/ukg-v4-prompts-validation.json').read_text(encoding='utf-8'))
          portfolio = json.loads(Path('production-prompts/ukg/V4_PORTFOLIO_MANIFEST.json').read_text(encoding='utf-8'))

          corrected_titles = {
              'communication-masters': 'My Communication Celebration',
              'reading-literacy-adventures': 'My Reading Celebration',
              'maths-explorers': 'My Maths Celebration',
              'logic-brain-builders': 'My Logic Celebration',
              'young-scientists': 'My Science Celebration',
              'creative-design-studio': 'My Creative Design Celebration',
              'my-amazing-world': 'My Amazing World Celebration',
              'digital-explorers': 'My Digital Learning Celebration',
              'healthy-me-wellbeing': 'My Wellbeing Celebration',
              'financial-literacy-life-skills': 'My Life Skills Celebration',
          }

          assert len(manifest['pages']) == 44
          assert [page['physical'] for page in manifest['pages']] == list(range(1, 45))
          assert [page['printed'] for page in manifest['pages']] == [None] * 5 + list(range(5, 43)) + [None]
          assert len(list((root / 'pages').glob('*.md'))) == 44
          assert len(list((root / 'pages').glob('*.json'))) == 44
          assert manifest['pages'][42]['printed'] == 42
          assert manifest['pages'][42]['title'] == corrected_titles[slug]
          assert manifest['pages'][43]['printed'] is None
          assert 'Back Cover' in manifest['pages'][43]['title']
          assert sum(1 for page in manifest['pages'] if 'Back Cover' in page['title']) == 1

          count = portfolio['books_completed']
          assert slug in qa['completed_books']
          assert qa['books_validated'] == count
          assert qa['page_prompts'] == 44 * count
          assert qa['markdown_files'] == 44 * count
          assert qa['json_files'] == 44 * count
          assert qa['source_backed_pages'] == 40 * count
          assert qa['checks'] == 572 * count
          assert qa['critical_defects'] == 0
          assert qa['status'] == 'PASS'
          PY

      - name: Commit generated UKG book
        if: ${{ steps.book.outputs.build == 'true' }}
        shell: bash
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
          TRIGGER: ${{ steps.book.outputs.trigger }}
        run: |
          rm -f "$TRIGGER"
          book_name="$(python - <<'PY'
          import json, os
          from pathlib import Path
          slug = os.environ['BOOK_SLUG']
          data = json.loads((Path('production-prompts') / slug / 'ukg' / 'v4' / 'release-manifest.json').read_text(encoding='utf-8'))
          print(data['book'])
          PY
          )"
          git config user.name 'BCube Production Bot'
          git config user.email 'info@bcubefutureacademy.in'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Finalize UKG ${book_name} V4 prompts [skip ukg auto]"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
