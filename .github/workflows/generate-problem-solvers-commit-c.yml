name: Generate Problem Solvers Commit C

on:
  push:
    branches:
      - book6/problem-solvers-phase1-3
    paths:
      - 'BCube_Gold_Production_v4/scripts/generate_problem_solvers_commit_c.py'
      - '.github/workflows/generate-problem-solvers-commit-c.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: book6/problem-solvers-phase1-3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Phase 5 and Phase 6 framework
        run: python BCube_Gold_Production_v4/scripts/generate_problem_solvers_commit_c.py

      - name: Verify framework report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('BCube_Gold_Production_v4/books/nursery/problem-solvers/qa/commit-c-framework-report.json')
          data = json.loads(p.read_text())
          assert data['overall_decision'] == 'PASS'
          assert data['required_files'] == 16
          assert not data['missing_files']
          PY

      - name: Commit generated framework
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BCube_Gold_Production_v4/books/nursery/problem-solvers/phase5 \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/phase6 \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/qa/commit-c-framework-report.json \
                  BCube_Gold_Production_v4/books/nursery/problem-solvers/qa/commit-c-summary.md
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
          else
            git commit -m 'feat(book6): add Problem Solvers Gold production and publishing framework'
            git push origin HEAD:book6/problem-solvers-phase1-3
          fi
