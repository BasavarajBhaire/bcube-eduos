name: Apply Cover Layout V1.2

on:
  push:
    branches:
      - agent/improve-cover-layout-engine
    paths:
      - scripts/_patch_cover_layout_v12.py
      - .github/workflows/apply-cover-layout-v12.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/improve-cover-layout-engine
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply patch
        run: python scripts/_patch_cover_layout_v12.py
      - name: Validate composer
        run: |
          python -m pip install -r requirements.txt
          python bcube-publishing-sdk/composer/compose_nursery_cover.py --self-test
          python scripts/validate_publishing_sdk.py
      - name: Remove bootstrap files
        run: |
          rm scripts/_patch_cover_layout_v12.py
          rm .github/workflows/apply-cover-layout-v12.yml
      - name: Commit production changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(publishing-v5): improve deterministic cover layout engine"
          git push origin HEAD:agent/improve-cover-layout-engine
