name: Generate Problem Solvers Commit A

on:
  push:
    branches:
      - book6/problem-solvers-phase1-3
    paths:
      - 'BCube_Gold_Production_v4/scripts/generate_problem_solvers_commit_a.py'
      - '.github/workflows/generate-problem-solvers-commit-a.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: book6/problem-solvers-phase1-3
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check openpyxl
      - name: Generate Phases 1–3 package
        run: python BCube_Gold_Production_v4/scripts/generate_problem_solvers_commit_a.py
      - name: Commit generated package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/books/nursery/problem-solvers
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "feat(book6): initialize Problem Solvers Gold with curriculum, architecture and production package"
            git push origin HEAD:book6/problem-solvers-phase1-3
          fi
