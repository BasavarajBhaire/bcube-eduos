name: Validate BCube standards

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build_lkg_v4:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'agent/lkg-confidence-social-skills-v4' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate and validate final LKG book
        shell: bash
        env:
          BOOK_SLUG: confidence-social-skills
        run: |
          python BCube_Gold_Production_v4/scripts/.lkg-patches/fix-confidence-teacher.py
          python BCube_Gold_Production_v4/scripts/prepare-lkg-v4-book.py
          python -m py_compile BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py "$BOOK_SLUG"
          python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py "$BOOK_SLUG" --validate-only
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('production-prompts/confidence-social-skills/lkg/v4')
          manifest = json.loads((root / 'release-manifest.json').read_text(encoding='utf-8'))
          qa = json.loads(Path('BCube_Gold_Production_v4/qa/lkg-v4-prompts-validation.json').read_text(encoding='utf-8'))
          portfolio = json.loads(Path('production-prompts/lkg/V4_PORTFOLIO_MANIFEST.json').read_text(encoding='utf-8'))
          page = json.loads((root / 'pages/CS-LKG-V4-P043-i-am-confident-and-kind.json').read_text(encoding='utf-8'))

          assert len(manifest['pages']) == 44
          assert [p['physical'] for p in manifest['pages']] == list(range(1, 45))
          assert len(list((root / 'pages').glob('*.md'))) == 44
          assert len(list((root / 'pages').glob('*.json'))) == 44
          assert manifest['pages'][42]['title'] == 'I Am Confident and Kind'
          assert manifest['pages'][42]['printed'] == 42
          assert manifest['pages'][43]['printed'] is None
          assert sum(1 for p in manifest['pages'] if 'Back Cover' in p['title']) == 1
          assert page['curriculum']['teacher_facilitation'] == 'Model one confident or kind action, invite a child response, and affirm effort.'
          assert 'back cover' not in page['curriculum']['teacher_facilitation'].lower()
          assert portfolio['books_completed'] == 10
          assert qa['books_validated'] == 10
          assert qa['page_prompts'] == 440
          assert qa['markdown_files'] == 440
          assert qa['json_files'] == 440
          assert qa['source_backed_pages'] == 400
          assert qa['checks'] == 5720
          assert qa['critical_defects'] == 0
          assert qa['status'] == 'PASS'
          assert qa['next_book'] is None
          PY

      - name: Remove temporary generation files
        shell: bash
        run: |
          rm -f BCube_Gold_Production_v4/queue/confidence-social-skills.trigger
          rm -f BCube_Gold_Production_v4/scripts/.lkg-patches/fix-confidence-teacher.py

      - name: Publish generated tree atomically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ['REPOSITORY']
          branch = os.environ['BRANCH']
          token = os.environ['GH_TOKEN']
          api = f'https://api.github.com/repos/{repository}'

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode('utf-8'))

          ref_path = '/git/ref/heads/' + urllib.parse.quote(branch, safe='/')
          ref = request('GET', ref_path)
          parent_sha = ref['object']['sha']
          parent = request('GET', f'/git/commits/{parent_sha}')
          base_tree = parent['tree']['sha']

          raw = subprocess.check_output(['git', 'status', '--porcelain=v1', '-z'])
          records = [record for record in raw.decode('utf-8').split('\0') if record]
          entries = []
          seen = set()
          for record in records:
              status = record[:2]
              path = record[3:]
              if ' -> ' in path:
                  path = path.split(' -> ', 1)[1]
              if path in seen:
                  continue
              seen.add(path)
              file_path = Path(path)
              if 'D' in status or not file_path.exists():
                  entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})
                  continue
              blob = request('POST', '/git/blobs', {
                  'content': base64.b64encode(file_path.read_bytes()).decode('ascii'),
                  'encoding': 'base64',
              })
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': blob['sha']})

          if not entries:
              raise SystemExit('No generated changes found to publish')

          tree = request('POST', '/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = request('POST', '/git/commits', {
              'message': 'Finalize LKG Confidence & Social Skills V4 prompts',
              'tree': tree['sha'],
              'parents': [parent_sha],
          })
          request('PATCH', '/git/refs/heads/' + urllib.parse.quote(branch, safe='/'), {
              'sha': commit['sha'],
              'force': False,
          })
          print(f"Published {len(entries)} changed paths in commit {commit['sha']}")
          PY

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/validate_repo.py
      - run: python scripts/build_docs.py
