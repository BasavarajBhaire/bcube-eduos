name: Validate BCube standards

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build_lkg_v4:
    if: ${{ github.event_name == 'pull_request' && startsWith(github.head_ref, 'agent/lkg-') && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Resolve LKG build trigger
        id: book
        shell: bash
        run: |
          slug="${GITHUB_HEAD_REF#agent/lkg-}"
          slug="${slug%-v4}"
          trigger="BCube_Gold_Production_v4/queue/${slug}.trigger"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          if test -f "$trigger" && test -d "production-prompts/${slug}/lkg/v3/pages"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare LKG compiler
        if: ${{ steps.book.outputs.build == 'true' }}
        run: |
          python BCube_Gold_Production_v4/scripts/.lkg-patches/fix-prepare-raw-string.py
          python BCube_Gold_Production_v4/scripts/prepare-lkg-v4-book.py

      - name: Check compiler syntax
        if: ${{ steps.book.outputs.build == 'true' }}
        run: python -m py_compile BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py

      - name: Generate LKG book
        if: ${{ steps.book.outputs.build == 'true' }}
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
        run: python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py "$BOOK_SLUG"

      - name: Validate generated LKG book
        if: ${{ steps.book.outputs.build == 'true' }}
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
        run: python BCube_Gold_Production_v4/scripts/build-lkg-v4-prompts.py "$BOOK_SLUG" --validate-only

      - name: Verify generated package and portfolio
        if: ${{ steps.book.outputs.build == 'true' }}
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          slug = os.environ['BOOK_SLUG']
          root = Path('production-prompts') / slug / 'lkg' / 'v4'
          manifest = json.loads((root / 'release-manifest.json').read_text(encoding='utf-8'))
          qa = json.loads(Path('BCube_Gold_Production_v4/qa/lkg-v4-prompts-validation.json').read_text(encoding='utf-8'))
          portfolio = json.loads(Path('production-prompts/lkg/V4_PORTFOLIO_MANIFEST.json').read_text(encoding='utf-8'))

          assert len(manifest['pages']) == 44
          assert [page['physical'] for page in manifest['pages']] == list(range(1, 45))
          assert len(list((root / 'pages').glob('*.md'))) == 44
          assert len(list((root / 'pages').glob('*.json'))) == 44
          assert manifest['pages'][43]['printed'] is None
          assert 'Back Cover' in manifest['pages'][43]['title']
          assert sum(1 for page in manifest['pages'] if 'Back Cover' in page['title']) == 1

          corrected_titles = {
              'stem-explorers': 'My STEM Celebration',
              'creativity-challenges': 'My Creative Celebration',
              'my-world-general-awareness': 'My World Celebration',
              'healthy-habits-safety': 'Healthy & Safe Celebration',
              'art-colour-fun': 'My Art Celebration',
              'confidence-social-skills': 'I Am Confident and Kind',
          }
          if slug in corrected_titles:
              assert manifest['pages'][42]['printed'] == 42
              assert manifest['pages'][42]['title'] == corrected_titles[slug]

          count = portfolio['books_completed']
          assert slug in qa['completed_books']
          assert qa['books_validated'] == count
          assert qa['page_prompts'] == 44 * count
          assert qa['markdown_files'] == 44 * count
          assert qa['json_files'] == 44 * count
          assert qa['source_backed_pages'] == 40 * count
          assert qa['checks'] == 572 * count
          assert qa['critical_defects'] == 0
          assert qa['status'] == 'PASS'
          PY

      - name: Commit generated LKG book
        if: ${{ steps.book.outputs.build == 'true' }}
        env:
          BOOK_SLUG: ${{ steps.book.outputs.slug }}
        run: |
          rm -f "BCube_Gold_Production_v4/queue/${BOOK_SLUG}.trigger"
          rm -f BCube_Gold_Production_v4/scripts/.lkg-patches/fix-prepare-raw-string.py
          git checkout origin/main -- .github/workflows/validate.yml
          book_name="$(python - <<'PY'
          import json, os
          from pathlib import Path
          slug = os.environ['BOOK_SLUG']
          data = json.loads((Path('production-prompts') / slug / 'lkg' / 'v4' / 'release-manifest.json').read_text(encoding='utf-8'))
          print(data['book'])
          PY
          )"
          git config user.name 'BCube Production Bot'
          git config user.email 'info@bcubefutureacademy.in'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Finalize LKG ${book_name} V4 prompts [skip lkg auto]"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/validate_repo.py
      - run: python scripts/build_docs.py
