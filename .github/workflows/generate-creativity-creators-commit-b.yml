name: Generate Creativity Creators Commit B

on:
  workflow_dispatch:
  push:
    branches:
      - book4/creativity-creators-phase1-2
    paths:
      - 'BCube_Gold_Production_v4/scripts/generate_creativity_creators_commit_b.py'
      - '.github/workflows/generate-creativity-creators-commit-b.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: book4/creativity-creators-phase1-2
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install workbook dependency
        run: python -m pip install --upgrade openpyxl

      - name: Generate Commit B package
        run: python BCube_Gold_Production_v4/scripts/generate_creativity_creators_commit_b.py

      - name: Validate generated package
        run: |
          test "$(find BCube_Gold_Production_v4/books/nursery/creativity-creators/production-prompts -name 'P*.md' | wc -l)" -eq 44
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('BCube_Gold_Production_v4/books/nursery/creativity-creators/qa/production-generation-report.json')
          report = json.loads(p.read_text())
          assert report['status'] == 'pass'
          assert report['actual'] == 44
          assert report['all_have_15_sections'] is True
          PY

      - name: Commit generated production package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
          else
            git commit -m 'feat(book4): add Creativity Creators Gold production package'
            git push origin HEAD:book4/creativity-creators-phase1-2
          fi
