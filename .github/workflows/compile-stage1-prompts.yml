name: Compile Stage 1 Prompts

on:
  workflow_dispatch:
  push:
    branches:
      - normalization/nursery-gold-v5
    paths:
      - "BCube_Gold_Production_v4/books/catalog.json"
      - "BCube_Gold_Production_v4/books/nursery/**/production-prompts/**"
      - "BCube_Gold_Production_v4/pipeline/stage1-prompt-compiler/**"
      - ".github/workflows/compile-stage1-prompts.yml"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: normalization/nursery-gold-v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile and validate prompts
        run: python BCube_Gold_Production_v4/pipeline/stage1-prompt-compiler/compiler/prompt_compiler.py

      - name: Commit generated Stage 1 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/pipeline/stage1-prompt-compiler/output
          if git diff --cached --quiet; then
            echo "No generated output changes"
          else
            git commit -m "build(stage1): compile and validate Nursery prompts"
            git push
          fi
