name: Validate Curiosity Explorers Phase 4

on:
  workflow_dispatch:
  push:
    branches:
      - book3/curiosity-explorers-phase3
    paths:
      - 'BCube_Gold_Production_v4/books/nursery/curiosity-explorers/**'
      - 'BCube_Gold_Production_v4/scripts/validate_curiosity_explorers_phase4.py'
      - '.github/workflows/validate-curiosity-explorers-phase4.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: book3/curiosity-explorers-phase3
          fetch-depth: 0

      - name: Validate Phase 4 package
        run: python3 BCube_Gold_Production_v4/scripts/validate_curiosity_explorers_phase4.py

      - name: Commit validation report when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/books/nursery/curiosity-explorers/qa/phase4-validation-report.json
          if git diff --cached --quiet; then
            echo "Validation report unchanged"
          else
            git commit -m "Validate Curiosity Explorers Phase 4"
            git push origin HEAD:book3/curiosity-explorers-phase3
          fi
