name: Generate Confidence Builders Commit A

on:
  push:
    branches:
      - book5/confidence-builders-phase1-3
    paths:
      - 'BCube_Gold_Production_v4/scripts/generate_confidence_builders_commit_a.py'
      - '.github/workflows/generate-confidence-builders-commit-a.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: book5/confidence-builders-phase1-3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl

      - name: Generate Commit A package
        run: python BCube_Gold_Production_v4/scripts/generate_confidence_builders_commit_a.py

      - name: Validate expected outputs
        run: |
          test "$(find BCube_Gold_Production_v4/books/nursery/confidence-builders/production-prompts -name 'P*.md' | wc -l)" -eq 44
          test -f BCube_Gold_Production_v4/books/nursery/confidence-builders/Confidence_Builders_Gold_Production_Prompts_v5.csv
          test -f BCube_Gold_Production_v4/books/nursery/confidence-builders/Confidence_Builders_Gold_Production_Prompts_v5.xlsx
          test -f BCube_Gold_Production_v4/books/nursery/confidence-builders/qa/prompt-validation-report.md

      - name: Commit generated package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
          else
            git commit -m 'feat(book5): initialize Confidence Builders Gold phases 1-3'
            git push origin HEAD:book5/confidence-builders-phase1-3
          fi
