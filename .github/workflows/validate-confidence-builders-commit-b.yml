name: Validate Confidence Builders Commit B

on:
  push:
    branches:
      - book5/confidence-builders-phase1-3
    paths:
      - 'BCube_Gold_Production_v4/scripts/validate_confidence_builders_commit_b.py'
      - 'BCube_Gold_Production_v4/books/nursery/confidence-builders/production-prompts/**'
      - '.github/workflows/validate-confidence-builders-commit-b.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: book5/confidence-builders-phase1-3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Commit B validator
        run: python BCube_Gold_Production_v4/scripts/validate_confidence_builders_commit_b.py

      - name: Commit generated validation package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders/validation
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders/qa
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders/illustration
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders/production
          git add BCube_Gold_Production_v4/books/nursery/confidence-builders/publishing
          if git diff --cached --quiet; then
            echo "Validation package already current"
          else
            git commit -m "feat(book5): add Confidence Builders Gold validation framework"
            git push origin HEAD:book5/confidence-builders-phase1-3
          fi
