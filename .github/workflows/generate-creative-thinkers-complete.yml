name: Generate Creative Thinkers Complete Book

on:
  push:
    branches:
      - book7/creative-thinkers-complete
    paths:
      - 'BCube_Gold_Production_v4/scripts/generate_creative_thinkers_complete.py'
      - '.github/workflows/generate-creative-thinkers-complete.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: book7/creative-thinkers-complete
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workbook dependency
        run: python -m pip install --disable-pip-version-check openpyxl

      - name: Generate all six phases
        run: python BCube_Gold_Production_v4/scripts/generate_creative_thinkers_complete.py

      - name: Commit complete Book 7 package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/books/nursery/creative-thinkers
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "feat(book7): complete Creative Thinkers Gold production framework [skip ci]"
            git push origin HEAD:book7/creative-thinkers-complete
          fi
