name: Validate Creativity Creators Commit C

on:
  push:
    branches:
      - book4/creativity-creators-phase1-2
    paths:
      - 'BCube_Gold_Production_v4/books/nursery/creativity-creators/**'
      - 'BCube_Gold_Production_v4/scripts/validate_creativity_creators_commit_c.py'
      - '.github/workflows/validate-creativity-creators-commit-c.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: book4/creativity-creators-phase1-2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Commit C validator
        run: python BCube_Gold_Production_v4/scripts/validate_creativity_creators_commit_c.py
      - name: Commit generated validation package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BCube_Gold_Production_v4/books/nursery/creativity-creators/validation
          git add BCube_Gold_Production_v4/books/nursery/creativity-creators/qa
          git add BCube_Gold_Production_v4/books/nursery/creativity-creators/illustration
          git add BCube_Gold_Production_v4/books/nursery/creativity-creators/production
          git add BCube_Gold_Production_v4/books/nursery/creativity-creators/publishing
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "feat(book4): generate Commit C validation package"
            git push origin HEAD:book4/creativity-creators-phase1-2
          fi
